<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS</title>
</head>
<body>
    <h1>Rock Paper Scissor</h1>
    <button onclick="
   user = 'rock';
   computer = options[Math.floor(Math.random()*3)];
   if (user==computer) {
       result = 'draw';
   }
   else if (computer=='paper') {
       result = 'You loose.'
   }
   else if (computer=='scisoor') {
        result = 'You win.'
   }
   document.getElementById('user').innerHTML = 'You: ' +user;
    document.getElementById('computer').innerHTML = 'Computer:' +computer;
    document.getElementById('result').innerHTML = 'Result:' +result;
    ">Rock</button>
    <button onclick="
    user = 'paper';
    computer = options[Math.floor(Math.random()*3)]
    if (user==computer) {
       result = 'draw';
   }
   else if (computer=='rock') {
       result = 'You win';
   }
   else if (computer=='scisoor') {
        result = 'You loose.';
   }
   document.getElementById('user').innerHTML = 'You: ' +user;
    document.getElementById('computer').innerHTML = 'Computer:' +computer;
    document.getElementById('result').innerHTML = 'Result:' +result;
    ">paper</button>
    <button onclick="
     user = 'scisoor';
    computer = options[Math.floor(Math.random()*3)]
    if (user==computer) {
       result = 'draw';
   }
   else if (computer=='rock') {
       result = 'You loose.';
   }
   else if (computer=='paper') {
        result = 'You win.';
   }
   document.getElementById('user').innerHTML = 'You: ' +user;
    document.getElementById('computer').innerHTML = 'Computer:' +computer;
    document.getElementById('result').innerHTML = 'Result:' +result;
    ">scisoor</button>
    <h1 id="user"></h1>
   <h1 id="computer"></h1>
   <h1 id="result"></h1>

   <script>
    var options = ['rock','paper','scisoor'];
    var user;
    var computer;
    var result;
   </script>
</body>
</html>
