<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS</title>
</head>
<body>
    <h1>Rock Paper Scissor using Function</h1>

    <button onclick="playgame('rock')">Rock</button>
    <button onclick="playgame('paper')">Paper</button>
    <button onclick="playgame('scisoor')">Scisoor</button>

    <h3 id="user"></h3>
    <h3 id="computer"></h3>
    <h3 id="result"></h3>

    <script>
        function playgame(choice) {
            var user = choice;
            var result;
            var options =['rock','paper','scisoor']
            var computer = options[Math.floor(Math.random()*3)];

            if (user == computer) {
                result = "Draw";
            }
            else if (
                (user =='rock'&& computer =='scisoor')||
                (user =='paper'&& computer =='rock')||
                (user =='scisoor'&& computer =='paper')
            ) {
                result = 'you win';
            }                      
            else {
                result = 'you loose';
            }                 
         document.getElementById('user').innerHTML = 'You: ' +user;
         document.getElementById('computer').innerHTML = 'Computer:' +computer;
         document.getElementById('result').innerHTML = 'Result:' +result;
        }
        </script>
</body>
</html>
